    <main class="main-formulario">
        <form action="" class="formulario">
            <label for="name">Nombre:</label>
            <input type="text" id="name" placeholder="Benjamin">
            <label for="surname">Apellido:</label>
            <input type="text" id="surname" placeholder="Nuñez">
            <label for="age">Edad:</label>
            <input type="number" id="age" placeholder="25">
            <label for="mail">E-mail:</label>
            <input type="email" required id="mail" placeholder="Benjaminnu200@gmail.com">
            <label for="pass">Contraseña:</label>
            <input type="password" required id="pass">
            <label for="comments">Comentarios</label>
            <textarea id="comments"></textarea>
            <input type="submit" value="Enviar">
            <input type="reset" value="Comenzar de nuevo">
        </form>
    </main>
